name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10

defaults:
  run:
    shell: bash --noprofile --norc -CeEuxo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
    permissions:
      security-events: write # for github/codeql-action/*

  # TODO: test container
  test:
    needs: tidy
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            package: test-crate
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            build-tool: cargo
            package: test-crate,test-crate
            auditable: true
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu.2.17
            build-tool: cargo-zigbuild
            auditable: true
          - os: macos-latest
            checksums: sha256,sha512,sha1,md5
          - os: macos-latest
            checksums: |
              sha256
              sha512
              sha1
              md5
            target: x86_64-apple-darwin
            workspace: true
          - os: macos-latest
            checksums: sha256 sha512 sha1 md5
            target: aarch64-apple-darwin
            auditable: true
          - os: macos-latest
            checksums: sha256, sha512, sha1, md5
            target: universal-apple-darwin
          - os: macos-latest
            checksums: sha256,sha512,sha1,md5
            target: universal-apple-darwin
            build-tool: cargo
          - os: windows-latest
            auditable: true
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: windows-11-arm
    runs-on: ${{ matrix.os || 'ubuntu-24.04' }}
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: rust@stable
          fallback: none
      - uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with:
          target: ${{ matrix.target }}
          runner: none
        if: matrix.target != '' && matrix.build-tool == 'cargo'
      - run: cargo new --bin test-crate
      - uses: ./
        id: upload-rust-binary-action
        with:
          dry-run: true
          bin: test-crate
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          auditable: ${{ matrix.auditable || 'false' }}
          no-default-features: true
          all-features: true
          package: ${{ matrix.package }}
          workspace: ${{ matrix.workspace || 'false' }}
          checksum: ${{ matrix.checksums || 'b2,sha256,sha512,sha1,md5' }}
          tar: all
          tar-xz: all
          zip: all
          manifest-path: test-crate/Cargo.toml
          codesign: '-'
          codesign-prefix: 'com.example.'
          codesign-options: 'runtime'
      - name: Verify embedded SBOM
        if: matrix.auditable
        run: |
          # Install the reader for the host: CARGO_BUILD_TARGET may be set (e.g.
          # by setup-cross-toolchain-action), which would otherwise cross-compile
          # rust-audit-info for the build target so it could not run here.
          host=$(rustc -vV | grep -E '^host:' | cut -d' ' -f2)
          cargo install rust-audit-info --locked --target "${host}"
          target="${MATRIX_TARGET%%.*}" # strip cargo-zigbuild .<glibc_version> suffix
          bin="test-crate/target/${target:+${target}/}release/test-crate"
          # rust-audit-info exits non-zero (and prints "No audit data found") if
          # the binary does not contain a cargo-auditable SBOM.
          rust-audit-info "${bin}"
        env:
          MATRIX_TARGET: ${{ matrix.target }}
      - name: Check action outputs
        run: |
          printf 'outputs.archive should not be empty\n'
          test -n "${OUTPUT_ARCHIVE}"

          printf 'outputs.zip should be a file\n'
          test -f "${OUTPUT_ZIP}"

          printf 'outputs.tar should be a file\n'
          test -f "${OUTPUT_TAR}"

          printf 'outputs.tar-xz should be a file\n'
          test -f "${OUTPUT_TAR_XZ}"

          printf 'outputs.sha256 should be a file\n'
          test -f "${OUTPUT_SHA256}"

          printf 'outputs.sha512 should be a file\n'
          test -f "${OUTPUT_SHA512}"

          printf 'outputs.sha1 should be a file\n'
          test -f "${OUTPUT_SHA1}"

          printf 'outputs.md5 should be a file\n'
          test -f "${OUTPUT_MD5}"
        env:
          OUTPUT_ARCHIVE: ${{ steps.upload-rust-binary-action.outputs.archive }}
          OUTPUT_ZIP: ${{ steps.upload-rust-binary-action.outputs.zip }}
          OUTPUT_TAR: ${{ steps.upload-rust-binary-action.outputs.tar }}
          OUTPUT_TAR_XZ: ${{ steps.upload-rust-binary-action.outputs.tar-xz }}
          OUTPUT_SHA256: ${{ steps.upload-rust-binary-action.outputs.sha256 }}
          OUTPUT_SHA512: ${{ steps.upload-rust-binary-action.outputs.sha512 }}
          OUTPUT_SHA1: ${{ steps.upload-rust-binary-action.outputs.sha1 }}
          OUTPUT_MD5: ${{ steps.upload-rust-binary-action.outputs.md5 }}
      - name: Check b2 output
        if: ${{ contains(matrix.checksums || 'b2,sha256,sha512,sha1,md5', 'b2') }}
        run: |
          printf 'outputs.b2 should not be empty\n'
          test -n "${OUTPUT_B2}"
        env:
          OUTPUT_B2: ${{ steps.upload-rust-binary-action.outputs.b2 }}
